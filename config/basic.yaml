# Krystal Basic Version Configuration
# Optimized for low-end PCs (2 cores CPU, 4GB RAM, 10GB SSD)

version: "basic"
display_name: "Krystal Basic"
description: "Optimized for low-end PCs with cloud-based services"

# Feature Flags
features:
  # Core Features (Always Enabled)
  chat: true
  file_operations: true
  code_writer: true
  
  # Voice Features (Cloud-based only for Basic)
  voice: true
  local_whisper: false
  cloud_whisper: true
  text_to_speech: true
  
  # Memory Features
  vector_memory: false
  mongodb: true
  
  # Advanced Features (Disabled for Basic)
  trading: false
  multiple_providers: false
  project_context: false
  social_hub: false
  advanced_plugins: false
  
  # Frontend Features
  dashboard: true
  memory_vault: false
  diary: false
  trading_hub: false
  api_keys: false

# Optimization Settings
optimizations:
  lazy_loading: true
  minimal_animations: true
  cloud_services: true
  local_models: false
  
# LLM Provider Settings
llm:
  primary_provider: "groq"
  fallback_provider: "gemini"
  max_tokens: 2048
  temperature: 0.7

# Voice Settings (Cloud-based)
voice:
  whisper_api: true
  local_model: false
  tts_enabled: true
  
# Database Settings
database:
  mongodb_enabled: true
  pinecone_enabled: false
  local_search: true

# Resource Limits
resource_limits:
  max_memory_mb: 2048
  max_cpu_percent: 70
  max_concurrent_requests: 5
